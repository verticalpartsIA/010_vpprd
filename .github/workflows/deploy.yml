name: Deploy — Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          script: |
            cd /home/u969661049/domains/vpgestaoimportacao.vpsistema.com/nodejs
            export PATH=/opt/alt/alt-nodejs22/root/usr/bin:$PATH
            git pull origin main
            npm install --omit=dev
            echo "{\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"$(git rev-parse HEAD)\"}" > version.json
            touch tmp/restart.txt
            echo "Deploy concluído: $(git log --oneline -1)"
